version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamingbot-app
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/streamingbot?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: streamingbot-postgres
    environment:
      POSTGRES_DB: streamingbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streamingbot"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streamingbot-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
